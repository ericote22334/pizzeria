<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Gestión del Menú</title>
<link rel="stylesheet" href="Estilos/menu.css">
</head>

<body>

<header>
        <img src="Captura de pantalla 2026-03-18 182924.png" class="logo">

<h1>Gestión del Menú</h1>

<div class="top-buttons">
<button onclick="location.href='panel-admin.html'" class="btn-volver">Volver</button>
<button onclick="location.href='index.html'" class="btn-cerrar">Cerrar sesión</button>
</div>

</header>

<main>

<!-- FORMULARIO -->
<section class="form-section">

<h2>Agregar Producto</h2>

<form>

<label>Nombre</label>
<input type="text" placeholder="Ej: Pizza Muzzarella">

<label>Categoría</label>
<select>
<option>Pizza</option>
<option>Bebida</option>
</select>

<label>Precio</label>
<input type="number" placeholder="Ej: 8500">

<button type="submit">Agregar</button>

</form>

</section>

<!-- TABLA -->
<section class="tabla-section">

<h2>Menú Actual</h2>

<table>

<thead>
<tr>
<th>ID</th>
<th>Producto</th>
<th>Categoría</th>
<th>Precio</th>
<th>Acciones</th>
</tr>
</thead>

<tbody>

<tr>
<td>1</td>
<td>Pizza Muzzarella</td>
<td>Pizza</td>
<td>$8500</td>
<td>
<button class="btn-edit">Editar</button>
<button class="btn-delete">Eliminar</button>
</td>
</tr>

<tr>
<td>2</td>
<td>Coca Cola</td>
<td>Bebida</td>
<td>$2000</td>
<td>
<button class="btn-edit">Editar</button>
<button class="btn-delete">Eliminar</button>
</td>
</tr>

</tbody>

</table>

</section>

</main>

</body>
</html>
